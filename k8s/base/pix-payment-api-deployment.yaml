# =============================================================================
# Lote 10 — Deployment: pix-payment-api
#
# Demonstrativo. Variaveis NAO sensiveis vem do ConfigMap; as sensiveis
# (database, usuario, senha) vem do Secret de exemplo. Health checks usam o
# Actuator (/actuator/health), exposto pelo Lote 8.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pix-payment-api
  namespace: pix-simulator
  labels:
    app.kubernetes.io/name: pix-payment-api
    app.kubernetes.io/part-of: pix-transaction-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pix-payment-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pix-payment-api
        app.kubernetes.io/part-of: pix-transaction-simulator
    spec:
      containers:
        - name: pix-payment-api
          # Imagem placeholder — publique a sua e ajuste a tag conforme necessario.
          image: pedroqueiroz/pix-payment-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # Variaveis nao sensiveis (hosts/portas/topicos/parametros da Outbox).
          envFrom:
            - configMapRef:
                name: pix-simulator-config
          # Variaveis sensiveis: injetadas do Secret (nunca em texto plano aqui).
          env:
            - name: SQLSERVER_DATABASE
              valueFrom:
                secretKeyRef:
                  name: pix-simulator-secret
                  key: SQLSERVER_DATABASE
            - name: SQLSERVER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pix-simulator-secret
                  key: SQLSERVER_USERNAME
            - name: SQLSERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pix-simulator-secret
                  key: SQLSERVER_PASSWORD
          # Health checks via Actuator (Lote 8). readiness controla trafego;
          # liveness controla restart. start-up lento do Spring Boot e coberto
          # pelo initialDelaySeconds + failureThreshold.
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
