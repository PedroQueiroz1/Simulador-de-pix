spring:
  application:
    name: pix-payment-api

  # Persistencia real em SQL Server.
  # A URL JDBC e montada a partir de variaveis de ambiente. Host/porta tem
  # default local (nao sensivel); nome do banco, usuario e senha NUNCA tem
  # default e vem do .env (ver .env.example) — fora do Git. Em Docker, o host
  # aponta para o servico "sqlserver". Os testes de integracao sobrescrevem
  # spring.datasource.* via Testcontainers.
  datasource:
    url: jdbc:sqlserver://${SQLSERVER_HOST:localhost}:${SQLSERVER_PORT:1433};databaseName=${SQLSERVER_DATABASE};encrypt=true;trustServerCertificate=true
    username: ${SQLSERVER_USERNAME}
    password: ${SQLSERVER_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      # Quem cria/altera o schema e o Flyway. O Hibernate apenas VALIDA se as
      # entities batem com as tabelas. Nunca usar create/update.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway versiona e aplica o schema (db/migration/V1__...).
  flyway:
    enabled: true

  # Lote 3: Redis para controle de idempotencia. Em producao real, host/porta
  # viriam de variaveis de ambiente; localmente apontam para o docker-compose.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Lote 6: Kafka como broker de eventos (Transactional Outbox). O endereco do
  # broker vem de variavel de ambiente; localmente aponta para o docker-compose.
  # Chave e valor sao Strings (partitionKey e payload JSON).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Lote 3: configuracao de idempotencia.
# ttl-seconds: tempo de vida do registro de idempotencia no Redis (24h).
pix:
  idempotency:
    ttl-seconds: 86400

  # Lote 6: Transactional Outbox + Kafka.
  kafka:
    topics:
      # Topico unico dos eventos de pagamento (CREATED/APPROVED/REJECTED).
      payment-events: ${PIX_PAYMENT_EVENTS_TOPIC:pix.payment.events}
  outbox:
    publisher:
      # Liga/desliga o publisher; intervalo de varredura; tamanho do lote; e
      # tentativas antes de marcar o evento como FAILED.
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
      batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:20}
      max-attempts: ${OUTBOX_PUBLISHER_MAX_ATTEMPTS:5}

server:
  # Porta da API. Default 8080 (nao sensivel); sobreposta via PAYMENT_API_PORT.
  port: ${PAYMENT_API_PORT:8080}
  # Nunca expor stack trace nem mensagem interna no corpo das respostas de erro.
  error:
    include-stacktrace: never
    include-message: never

# Lote 8: Actuator com exposicao limitada. Apenas health/info ficam acessiveis
# via web; endpoints sensiveis (env, beans, heapdump, threaddump) NAO sao
# expostos. health.show-details=never evita vazar detalhes de infraestrutura.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Lote 8: rastreabilidade nos logs. O CorrelationIdFilter coloca correlationId,
# requestId e paymentId no MDC; o padrao abaixo os imprime em cada linha (vazio
# quando ausente). NUNCA logamos senhas, tokens, secrets nem connection strings.
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-} requestId=%X{requestId:-} paymentId=%X{paymentId:-}]"
