spring:
  application:
    name: pix-payment-api

  # Lote 2: persistencia real em SQL Server.
  # Valores sensiveis (URL com nome do banco, usuario e senha) NUNCA ficam aqui:
  # vem de variaveis de ambiente, definidas no .env (ver .env.example e README).
  # Os testes de integracao sobrescrevem estas propriedades via Testcontainers.
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      # Quem cria/altera o schema e o Flyway. O Hibernate apenas VALIDA se as
      # entities batem com as tabelas. Nunca usar create/update.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Lote 2: Flyway versiona e aplica o schema (db/migration/V1__...).
  flyway:
    enabled: true

server:
  port: 8080
  # Nunca expor stack trace nem mensagem interna no corpo das respostas de erro.
  error:
    include-stacktrace: never
    include-message: never
