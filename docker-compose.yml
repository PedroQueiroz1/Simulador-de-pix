# Subir:  docker compose up -d sqlserver redis kafka
#
# O database NAO e criado automaticamente. Com o .env carregado no shell,
# crie-o uma unica vez:
#   docker exec -i pix-sqlserver /opt/mssql-tools18/bin/sqlcmd \
#     -S localhost -U "$DB_USERNAME" -P "$DB_PASSWORD" -C \
#     -Q "IF DB_ID('$DB_NAME') IS NULL CREATE DATABASE [$DB_NAME];"
#
# As tabelas sao criadas pelo Flyway quando a aplicacao sobe.
# Os testes de integracao NAO usam este compose: sobem SQL Server e Redis
# via Testcontainers.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pix-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      # Senha lida do .env. Falha cedo, com mensagem clara, se nao estiver definida.
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?defina DB_PASSWORD no arquivo .env}"
    ports:
      - "1433:1433"
    volumes:
      - pix-sqlserver-data:/var/opt/mssql

  # Lote 3: Redis como camada de controle de idempotencia.
  # Sem volume: registros de idempotencia sao temporarios (TTL) e nao precisam
  # sobreviver a reinicializacao do container.
  redis:
    image: redis:7-alpine
    container_name: pix-redis
    ports:
      - "6379:6379"

  # Lote 6: Kafka como broker de eventos (Transactional Outbox), em modo KRaft
  # (sem Zookeeper), nó único. Comunicacao local em PLAINTEXT, SEM credenciais —
  # adequado apenas para desenvolvimento. Anunciado como localhost:9092 para a
  # aplicacao rodando na maquina host (mvn spring-boot:run). Sem volume: em dev
  # o broker pode reformatar o storage a cada subida.
  kafka:
    image: apache/kafka:3.8.1
    container_name: pix-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  pix-sqlserver-data:
