# =============================================================================
# Lote 10 — nginx do frontend-demo
#
# Serve os arquivos estáticos e faz reverse-proxy de /api e /actuator para a
# pix-payment-api. Assim o navegador fala sempre com a MESMA origem (o frontend),
# e o nginx encaminha para a API internamente — sem necessidade de CORS.
#
# O proxy usa o DNS interno do Docker (resolver 127.0.0.11) e uma variável em
# proxy_pass para que o nginx suba mesmo que a API ainda não esteja pronta
# (resolução acontece por requisição, não no boot).
# =============================================================================
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Cabeçalhos simples de segurança (demo).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Arquivos estáticos do frontend.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # DNS interno do Docker; resolve o nome do serviço da API por requisição.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $pix_api "http://pix-payment-api:8080";

    # Proxy da API de negócio.
    location /api/ {
        proxy_pass $pix_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy do Actuator (health/info), útil para inspeção pela própria página.
    location /actuator/ {
        proxy_pass $pix_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
